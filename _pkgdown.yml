url: https://daapr-team.github.io/daapr/
template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]

articles:
- title: Build a data product
  navbar: ~
  contents:
  - min_wrkfl
  - input_data_update
  - dp_update
  - min_workflow_local
  - dp_merge
  - faq
  - dpi


reference:
- title: Credential functions
- contents:
  - starts_with("board_params_")
  - starts_with("creds_set_")
- title: Data product core functions
- contents:
  - starts_with("dp_")
- title: Config functions
- contents:
  - starts_with("dpconf_")
- title: Input functions
- contents:
  - starts_with("dpinput_")
  - inputmap_clean
- title: Helper data product functions
- contents:
  - dpcode_add
  - starts_with("dpname_")
  - readme_get
- title: Auxillary functions
- contents:
  - dppkg_modify
  - fn_dry
  - is_valid_dp_repository
  - make_names_codefriendly
  - tbsig_get
